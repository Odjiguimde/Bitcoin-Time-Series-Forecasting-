# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Bitcoin Time Series Stack
# Services : API (FastAPI) + Dashboard (Streamlit) + Nginx
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── FastAPI — Forecasting API ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: bitcoin-ts-api:latest
    container_name: bitcoin-ts-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - WORKERS=2
      - LOG_LEVEL=info
      - TF_CPP_MIN_LOG_LEVEL=3
    volumes:
      - ./data:/app/data:ro        # Dataset (lecture seule)
      - ./models:/app/models       # Modèles sauvegardés (lecture/écriture)
    healthcheck:
      test: ["CMD", "python", "-c",
             "import requests; requests.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - bitcoin-net

  # ── Streamlit — Dashboard interactif ────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    image: bitcoin-ts-dashboard:latest
    container_name: bitcoin-ts-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./data:/app/data:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - bitcoin-net

  # ── Nginx — Reverse Proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bitcoin-ts-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - bitcoin-net

networks:
  bitcoin-net:
    driver: bridge

volumes:
  models_data:
