# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Reverse Proxy pour Bitcoin TS Stack
# API       → http://localhost/api/
# Dashboard → http://localhost/
# ─────────────────────────────────────────────────────────────────────────────

upstream bitcoin_api {
    server api:8000;
    keepalive 32;
}

upstream bitcoin_dashboard {
    server dashboard:8501;
    keepalive 16;
}

# ── Rate limiting ─────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

server {
    listen 80;
    server_name _;

    # ── Timeouts ───────────────────────────────────────────────────────────────
    proxy_connect_timeout       60s;
    proxy_send_timeout         300s;
    proxy_read_timeout         300s;

    # ── Headers de sécurité ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"     always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection       "1; mode=block"  always;

    # ── API FastAPI (/api/*) ───────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;

        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://bitcoin_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Swagger UI direct (/docs) ──────────────────────────────────────────────
    location /docs {
        proxy_pass http://bitcoin_api/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://bitcoin_api/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Dashboard Streamlit (/) ────────────────────────────────────────────────
    location / {
        proxy_pass         http://bitcoin_dashboard;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSockets requis par Streamlit
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # ── Streamlit static assets ────────────────────────────────────────────────
    location /_stcore/ {
        proxy_pass         http://bitcoin_dashboard/_stcore/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ── Healthcheck Nginx ──────────────────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
